<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>TechStore</title>
    </head>
    <body>
        <header>
            <h1>TechStore</h1>
            <nav>
                <a href="index.php?page=accueil">Accueil</a>
                <a href="index.php?page=catalogue">Catalogue</a>
                <a href="index.php?page=formulaire_contact">Contact</a>
                <a href="index.php?page=mention_legale">Mention légale</a>
                <a href="index.php?page=Condition">Conditions d'utilisation</a>
                <a href="index.php?page=profil">Profil</a>
                <a href="index.php?page=connexion">Connexion</a>   <!-- @TODO : Afficher conditionellement Se Connecter ou Se Déconnecter Suite a la disposition du token -->
            </nav>
        </header>
        <section class="hero">
            <h2>Leader international en informatique</h2>
            <p>Nous sélectionnons les meilleurs équipements informatiques pour les développeurs et autres amateurs de technologie.</p>
        </section>
        <div id="fiche-produit">

        </div>

        <script>
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");


            fetch("products.json")
            .then(res => res.json())
            .then(data => {
                const produit = data.find(p => p.id == id);

                if (produit) {
                    const fiche = document.getElementById("fiche-produit");
                    
                    fiche.innerHTML = `
                        <img src="${produit.image}" alt="${produit.name}">
                        
                        <div class="product-info">
                            <h1>${produit.name}</h1>
                            <div class="badges">
                                <span class="badge">📍 Origine : ${produit.origin || "Inconnue"}</span><br>
                                <span class="badge">⭐ ${produit.note || "Non noté"} / 5</span>
                            </div>
                            
                            <p>${produit.description}</p>
                            
                            <p class="price-tag">${produit.price}</p>
                            
                            <div class="btn-container">
                                <button onclick="ajouterAuPanier(${produit.id}, ${produit.price}, '${encodeURIComponent(produit.name)}')">Ajouter au panier</button>
                                <button><a href="index.php?page=catalogue" class="btn-secondary">Retour au catalogue</a></button>
                                <button><a href="index.php?page=accueil" class="btn-secondary">Retour à l'accueil</a></button>
                            </div>
                        </div>

                        <style>
                            a {
                            text-decoration: none;
                            color: inherit;
                        }

                           /* Conteneur principal de la fiche */
                        #fiche-produit {
                            max-width: 900px;
                            margin: 40px auto;
                            padding: 20px;
                            background: #fff;
                            border-radius: 12px;
                            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                            display: flex;
                            flex-wrap: wrap;
                            gap: 30px;
                            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                            color: #333;
                        }

                        /* Partie Image */
                        #fiche-produit img {
                            flex: 1;
                            min-width: 300px;
                            max-width: 100%;
                            height: auto;
                            border-radius: 8px;
                            object-fit: contain;
                            background: #f9f9f9;
                            padding: 10px;
                        }

                        /* Partie Informations */
                        .product-info {
                            flex: 1.2;
                            min-width: 300px;
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                        }

                        #fiche-produit h1 {
                            font-size: 2rem;
                            margin-bottom: 15px;
                            color: #2c3e50;
                        }

                        #fiche-produit p {
                            line-height: 1.6;
                            margin-bottom: 10px;
                        }

                        /* Style spécifique pour le prix */
                        .price-tag {
                            font-size: 1.5rem;
                            font-weight: bold;
                            color: #27ae60;
                            margin: 20px 0;
                        }

                        /* Badges pour Origine et Note */
                        .badge {
                            display: inline-block;
                            padding: 4px 12px;
                            background: #f0f2f5;
                            border-radius: 20px;
                            font-size: 0.9rem;
                            margin-right: 10px;
                            color: #555;
                        }

                        /* Boutons */
                        .btn-container {
                            margin-top: 25px;
                            display: flex;
                            gap: 10px;
                            flex-wrap: wrap;
                        }

                        button {
                            padding: 12px 20px;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-weight: 600;
                            transition: transform 0.2s, background 0.2s;
                        }

                        button:first-of-type { /* Ajouter au panier */
                            background-color: #3498db;
                            color: white;
                            flex-grow: 2;
                        }

                        button:first-of-type:hover {
                            background-color: #2980b9;
                            transform: translateY(-2px);
                        }

                        /* Liens déguisés en boutons secondaires */
                        .btn-secondary {
                            background-color: #ecf0f1;
                            color: #333;
                            text-decoration: none;
                            padding: 12px 15px;
                            border-radius: 6px;
                            font-size: 0.9rem;
                            text-align: center;
                        }

                        .btn-secondary:hover {
                            background-color: #bdc3c7;
                        }

                        /* Responsive mobile */
                        @media (max-width: 600px) {
                            #fiche-produit {
                                flex-direction: column;
                                margin: 10px;
                            }
                        }
                    </style> 
                    `;
                } else {
                    document.getElementById("fiche-produit").innerHTML = "Produit non trouvé.";
                }
            });

            function getCookie(name) {
            const value = `; ${document.cookie}`;
            
            if(value.length > 0){
                return true
            }else {
                return false
            }
        }

        function ajouterAuPanier(produitId,price,name) {
             name = decodeURIComponent(name);

            const userToken = getCookie("auth_token");
            console.log(userToken);
            
            
            if(!userToken){
                alert('Vous devez vous connecter pour passer un achat');
                return
            }
            


            const formData = new FormData();
            formData.append('produit_id', produitId);
            formData.append('price', price);
            formData.append('name', name);

            

            const result = fetch('ajouter_panier.php', {
                method: 'POST',
                body: formData,
                credentials: 'same-origin'
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert("Produit ajouté au panier !");
                } else {
                    alert("Erreur : " + data.message);
                }
            })
            .catch(err => {
                console.error("Erreur lors de l'ajout au panier :", err);
                alert("Une erreur est survenue. Veuillez réessayer.");
            });

            console.log(result,"résultat requete");
            
        }
        </script>
        <footer>
            <p>TechStore</p>
            <p>contact@techstore.fr</p>
            <p>01 23 45 67 89</p>
        </footer>
    </body>
</html>
